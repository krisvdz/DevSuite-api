# ═══════════════════════════════════════════════════════════════════════════
# CI PIPELINE — Continuous Integration para o Backend
# ═══════════════════════════════════════════════════════════════════════════
#
# 📚 CONCEITO: CI/CD (Continuous Integration / Continuous Deployment)
#
# CI = Continuous Integration
# Toda vez que código é enviado ao repositório, um pipeline automático:
# 1. Instala dependências
# 2. Roda lint (qualidade de código)
# 3. Verifica tipos TypeScript
# 4. Roda testes
# 5. Faz build (verifica que compila sem erros)
#
# Por que isso é importante?
# - Detecta bugs ANTES de chegar em produção
# - Garante que o código do time sempre compila
# - "If it's not tested, it's broken" — dá confiança para fazer mudanças
#
# CD = Continuous Deployment
# Se o CI passou, automaticamente faz deploy em staging/produção.
#
# 📚 CONCEITO: GitHub Actions
# É o serviço de CI/CD do GitHub, grátis para repos públicos.
# Competitors: GitLab CI, Jenkins, CircleCI, Bitbucket Pipelines.
#
# Anatomia de um workflow:
# - name: nome do workflow
# - on: quando disparar (push, pull_request, schedule...)
# - jobs: grupos de steps que rodam em paralelo
# - steps: comandos executados em sequência dentro de um job

name: CI — API

# Dispara quando há push ou PR nas branches main/develop
on:
  push:
    branches: [main, develop]
    paths:
      - 'taskflow-api/**'  # Só roda se arquivos do backend mudaram
      - '.github/workflows/ci-api.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'taskflow-api/**'

# Variáveis de ambiente disponíveis em todos os jobs
env:
  NODE_VERSION: '20'

jobs:
  # ─── Job: quality-check ──────────────────────────────────────────────────
  quality-check:
    name: Lint + Type Check
    # Qual máquina usar — ubuntu-latest é o mais comum e econômico
    runs-on: ubuntu-latest

    steps:
      # 1. Clona o repositório no runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configura o Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Cache das dependências — evita npm install completo a cada run
          # Cache é baseado no hash do package-lock.json
          cache: 'npm'
          cache-dependency-path: taskflow-api/package-lock.json

      # 3. Instala dependências
      - name: Install dependencies
        working-directory: ./taskflow-api
        run: npm ci  # ci = install limpo, determinístico

      # 4. Gera o Prisma Client (necessário para type-check)
      - name: Generate Prisma Client
        working-directory: ./taskflow-api
        run: npx prisma generate

      # 5. Verifica tipos TypeScript
      - name: TypeScript type check
        working-directory: ./taskflow-api
        run: npx tsc --noEmit

  # ─── Job: build ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-check  # só roda se quality-check passar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: taskflow-api/package-lock.json

      - name: Install dependencies
        working-directory: ./taskflow-api
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./taskflow-api
        run: npx prisma generate

      - name: Build TypeScript
        working-directory: ./taskflow-api
        run: npm run build

      # Salva o artifact de build para uso no job de deploy
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: taskflow-api/dist/
          retention-days: 7

  # ─── Job: docker ──────────────────────────────────────────────────────────
  # Constrói e publica a imagem Docker (apenas na branch main)
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    # Só executa em push para main (não em PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 📚 CONCEITO: Docker Registry
      # Onde as imagens Docker são armazenadas.
      # Docker Hub: registry público oficial
      # GitHub Container Registry (ghcr.io): integrado ao GitHub, grátis
      # AWS ECR, Google Artifact Registry: para clouds específicas
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # token automático do GitHub Actions

      # 📚 CONCEITO: Docker Buildx
      # Buildx é uma extensão que permite builds multi-plataforma
      # (linux/amd64 para servidores, linux/arm64 para Apple Silicon, etc.)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Extrai metadados para tags da imagem (versão, branch, etc.)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./taskflow-api
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de layers entre builds — acelera muito builds repetidos
          cache-from: type=gha
          cache-to: type=gha,mode=max
